services:
  prefect:
    build:
      context: .
      dockerfile: docker/prefect.Dockerfile
    container_name: mmut-orch-prefect
    ports:
      - "4200:4200"
    environment:
      - PREFECT_API_HOST=0.0.0.0
      - PREFECT_API_URL=http://127.0.0.1:4200/api
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4200/api/health >/dev/null || curl -fsS http://localhost:4200/docs >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - mmut-network

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: mmut-orch-api
    ports:
      - "8002:8002"
    volumes:
      - ./config:/app/config
      - ./mmut:/app/mmut
      - ./shared:/app/shared
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PREFECT_API_URL=http://prefect:4200/api
    depends_on:
      prefect:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8002/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - mmut-network

networks:
  mmut-network:
    driver: bridge
